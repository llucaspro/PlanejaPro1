openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: PlanejaPro API - Copiloto inteligente para planejamento pedagógico
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: planning
    description: Geração de planejamento pedagógico com IA
  - name: assistant
    description: Assistente pedagógico conversacional
  - name: exam
    description: Criação de provas com IA

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /planning/generate:
    post:
      operationId: generatePlanning
      tags: [planning]
      summary: Gera planejamento pedagógico completo com IA
      description: Recebe dados do formulário e retorna planejamento completo gerado pela IA
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlanningInput"
      responses:
        "200":
          description: Planejamento gerado com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratedPlanning"
        "400":
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Erro interno / falha na IA
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /assistant/chat:
    post:
      operationId: assistantChat
      tags: [assistant]
      summary: Envia mensagem ao assistente pedagógico
      description: Chat contextual com especialista em didática e metodologias ativas
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatInput"
      responses:
        "200":
          description: Resposta do assistente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"
        "400":
          description: Mensagem inválida
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Erro interno / falha na IA
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /exam/generate:
    post:
      operationId: generateExam
      tags: [exam]
      summary: Gera prova completa com IA
      description: Recebe parâmetros da prova e retorna questões geradas pela IA prontas para impressão
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExamInput"
      responses:
        "200":
          description: Prova gerada com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratedExam"
        "400":
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Erro interno / falha na IA
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    PlanningInput:
      type: object
      required:
        - disciplina
        - anoSerie
        - quantidadeAulas
        - duracaoAula
        - conteudo
      properties:
        disciplina:
          type: string
          description: Disciplina (ex. Matemática, Português)
        anoSerie:
          type: string
          description: Ano/Série (ex. 6º Ano, 2º EM)
        turma:
          type: string
          description: Identificação da turma
        quantidadeAulas:
          type: integer
          minimum: 1
          maximum: 50
          description: Número de aulas no planejamento
        duracaoAula:
          type: integer
          minimum: 30
          maximum: 240
          description: Duração de cada aula em minutos
        perfilTurma:
          type: array
          items:
            type: string
          description: Perfis da turma (participativa, agitada, etc)
        objetivos:
          type: string
          description: Objetivos desejados pelo professor
        conteudo:
          type: string
          description: Conteúdo a ser trabalhado
        recursosDisponiveis:
          type: array
          items:
            type: string
          description: Recursos disponíveis (projetor, internet, etc)
        observacoes:
          type: string
          description: Observações adicionais do professor

    GeneratedPlanning:
      type: object
      required:
        - tema
        - objetivoGeral
        - objetivosEspecificos
        - competencias
        - habilidades
        - metodologia
        - sequenciaDidatica
        - atividadeInicial
        - desenvolvimento
        - atividadePratica
        - encerramento
        - avaliacao
        - criteriosAvaliativos
        - estrategiasInclusivas
        - adaptacoesDificuldades
        - recursosNecessarios
        - tarefaCasa
        - observacoesPedagogicas
        - versaoResumida
        - sugestoesExtras
      properties:
        tema:
          type: string
        objetivoGeral:
          type: string
        objetivosEspecificos:
          type: array
          items:
            type: string
        competencias:
          type: array
          items:
            type: string
        habilidades:
          type: array
          items:
            type: string
        metodologia:
          type: string
        sequenciaDidatica:
          type: array
          items:
            type: string
        atividadeInicial:
          type: string
        desenvolvimento:
          type: string
        atividadePratica:
          type: string
        encerramento:
          type: string
        avaliacao:
          type: string
        criteriosAvaliativos:
          type: array
          items:
            type: string
        estrategiasInclusivas:
          type: string
        adaptacoesDificuldades:
          type: string
        recursosNecessarios:
          type: array
          items:
            type: string
        tarefaCasa:
          type: string
        observacoesPedagogicas:
          type: string
        versaoResumida:
          type: string
        sugestoesExtras:
          type: array
          items:
            type: string

    ChatMessage:
      type: object
      required:
        - role
        - content
      properties:
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string

    ChatInput:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          description: Mensagem do professor ao assistente
        history:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
          description: Histórico de mensagens anteriores
        planningContext:
          type: string
          description: Contexto do planejamento atual (opcional)

    ChatResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          description: Resposta do assistente pedagógico

    ExamInput:
      type: object
      required:
        - disciplina
        - anoSerie
        - conteudo
        - questoesDiscursivas
        - questoesAlternativas
      properties:
        nomeEscola:
          type: string
          description: Nome da escola
        nomeProfessor:
          type: string
          description: Nome do professor
        disciplina:
          type: string
          description: Disciplina da prova
        anoSerie:
          type: string
          description: Ano/Série
        turma:
          type: string
          description: Turma
        bimestre:
          type: string
          description: Bimestre/Trimestre (ex. 1º Bimestre)
        conteudo:
          type: string
          description: Conteúdo que será cobrado na prova
        questoesDiscursivas:
          type: integer
          minimum: 0
          maximum: 8
          description: Número de questões discursivas (0 a 8)
        questoesAlternativas:
          type: integer
          minimum: 0
          maximum: 20
          description: Número de questões de múltipla escolha (0 a 20)
        instrucoes:
          type: string
          description: Instruções adicionais para os alunos
        valorTotal:
          type: number
          description: Valor total da prova em pontos

    ExamAlternativa:
      type: object
      required:
        - numero
        - enunciado
        - alternativas
        - gabarito
      properties:
        numero:
          type: integer
        enunciado:
          type: string
        alternativas:
          type: object
          required: [a, b, c, d, e]
          properties:
            a:
              type: string
            b:
              type: string
            c:
              type: string
            d:
              type: string
            e:
              type: string
        gabarito:
          type: string
          description: Letra da resposta correta (a, b, c, d ou e)
        valor:
          type: number

    ExamDiscursiva:
      type: object
      required:
        - numero
        - enunciado
        - valor
      properties:
        numero:
          type: integer
        enunciado:
          type: string
        linhasResposta:
          type: integer
          description: Número de linhas sugeridas para resposta
        valor:
          type: number
        criterios:
          type: string
          description: Critérios de correção

    GeneratedExam:
      type: object
      required:
        - titulo
        - instrucoes
        - questoesAlternativas
        - questoesDiscursivas
      properties:
        titulo:
          type: string
        instrucoes:
          type: string
        questoesAlternativas:
          type: array
          items:
            $ref: "#/components/schemas/ExamAlternativa"
        questoesDiscursivas:
          type: array
          items:
            $ref: "#/components/schemas/ExamDiscursiva"
